name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  bash:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: shellcheck
        run: |
          sudo apt-get update -qq && sudo apt-get install -y shellcheck
          shellcheck install.sh
      - name: bash syntax
        run: bash -n install.sh
      - name: catalog renders
        run: bash install.sh --list
      - name: dry-run all (no network installs)
        run: bash install.sh --all --dry-run

  powershell:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - name: PSScriptAnalyzer
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module PSScriptAnalyzer -Force -Scope CurrentUser
          # Все замечания печатаем; билд валим только на Error и на ParseError.
          Invoke-ScriptAnalyzer -Path ./install.ps1 -Severity Warning,Error | Format-Table -Auto
          $errs = Invoke-ScriptAnalyzer -Path ./install.ps1 -Severity Error,ParseError
          if ($errs.Count -gt 0) { throw "PSScriptAnalyzer нашёл $($errs.Count) ошибок" }
      - name: catalog renders
        shell: pwsh
        run: ./install.ps1 -List
      - name: dry-run all (no network installs)
        shell: pwsh
        run: ./install.ps1 -All -DryRun
      - name: only + version
        shell: pwsh
        run: |
          ./install.ps1 -Version
          ./install.ps1 -Only graphify,gstack -DryRun
